name: Daily Blog Automation

on:
  schedule:
    # 06:30 East Africa Time (UTC+3) every day
    - cron: '30 3 * * *'
  workflow_dispatch:

concurrency:
  group: daily-blog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate verified daily blog post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY secret is missing."
            exit 1
          fi
          npm run blog:generate:daily

      - name: Validate build
        run: npm run lint && npm run build

      - name: Commit and push generated content
        run: |
          if git diff --quiet -- public/content/blog-posts.json; then
            echo "No blog changes generated. Skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/blog-posts.json
          git commit -m "chore: publish daily AI blog post $(date -u +%F)"
          git push
